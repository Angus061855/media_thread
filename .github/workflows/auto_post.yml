name: Auto Post to Threads

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 12 * * *'
    - cron: '0 14 * * *'

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run auto post script
        env:
          env:
  THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
  IG_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  NOTION_TOKEN: ${{ secrets.NOTION_API_KEY }}
  NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
  NOTION_PENDING_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID_2 }}
  NOTION_POST_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID_3 }}
        run: |
          pip uninstall google-generativeai -y || true
          pip install google-genai notion-client requests
          python test.py
